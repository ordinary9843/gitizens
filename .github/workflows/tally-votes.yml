name: "[WORLD] Tally Votes"

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      skip_timing:
        description: "Skip 24h voting period check (testing only)"
        required: false
        default: "false"

concurrency:
  group: world-tick
  cancel-in-progress: false

jobs:
  tally:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      issues: write
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "gitizens-bot"
          git config user.email "gitizens-bot@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python -m pytest tests/ -q

      - name: Tally votes and apply effects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SKIP_TIMING_CHECK: ${{ inputs.skip_timing }}
        run: python scripts/tally_votes.py
