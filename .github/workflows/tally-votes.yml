name: "[WORLD] Tally Votes"

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      skip_timing:
        description: "Skip 24h voting period check (testing only)"
        required: false
        default: "false"

jobs:
  tally:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
      models: read
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "gitizens-bot"
          git config user.email "gitizens-bot@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openai pyyaml

      - name: Tally votes and apply effects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SKIP_TIMING_CHECK: ${{ inputs.skip_timing }}
        run: python scripts/tally_votes.py
