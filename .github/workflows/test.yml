name: "[CI] Tests"

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt "genbadge[coverage]"

      - name: Run tests
        env:
          GITHUB_TOKEN: placeholder
          GITHUB_REPOSITORY: ordinary9843/gitizens
        run: python -m pytest tests/ -v --cov=scripts --cov-report=xml

      - name: Generate coverage badge
        run: genbadge coverage -i coverage.xml -o docs/coverage-badge.svg

      - name: Commit badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "gitizens-bot"
          git config user.email "bot@gitizens"
          git add docs/coverage-badge.svg
          git diff --staged --quiet || git commit -m "[CI] update coverage badge"
          git push

  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
      - name: Run actionlint
        run: ./actionlint -color
