<svg viewBox="0 0 1200 420" width="1200" height="420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gitizens — a civilization that lives inside a GitHub repo">
  <defs>
    <pattern id="win-dim" width="14" height="20" patternUnits="userSpaceOnUse">
      <rect x="3" y="5" width="7" height="9" fill="#21262d"/>
    </pattern>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#10161f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#e3b341" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#e3b341" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect x="1" y="1" width="1198" height="418" rx="16" fill="url(#sky)" stroke="#30363d" stroke-width="2"/>

  <!-- faint stars -->
  <g fill="#8b949e" opacity="0.5">
    <rect x="640" y="60" width="2" height="2"/>
    <rect x="730" y="100" width="2" height="2"/>
    <rect x="900" y="55" width="2" height="2"/>
    <rect x="1010" y="120" width="2" height="2"/>
    <rect x="820" y="90" width="2" height="2"/>
    <rect x="580" y="130" width="2" height="2"/>
    <rect x="1140" y="160" width="2" height="2"/>
  </g>

  <!-- the GitHub star (treasury) -->
  <circle cx="1090" cy="78" r="46" fill="url(#glow)"/>
  <g transform="translate(1090,78)">
    <path d="M0,-16 L4.7,-4.9 L16.5,-4.9 L7,2.6 L10.2,14 L0,7.4 L-10.2,14 L-7,2.6 L-16.5,-4.9 L-4.7,-4.9 Z"
          fill="#e3b341" stroke="#0d1117" stroke-width="1.5"/>
  </g>
  <text x="1090" y="118" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="11" fill="#e3b341" opacity="0.85">★ = +10 GC</text>

  <!-- ============ CITY ============ -->
  <!-- buildings: roofline color = policy badge color -->
  <g>
    <!-- education / purple -->
    <rect x="560" y="248" width="68" height="114" fill="#161b22" stroke="#30363d"/>
    <rect x="560" y="248" width="68" height="5" fill="#bc8cff"/>
    <rect x="566" y="262" width="56" height="92" fill="url(#win-dim)"/>
    <rect x="583" y="287" width="7" height="9" fill="#bc8cff" opacity="0.9"/>
    <rect x="611" y="327" width="7" height="9" fill="#e3b341" opacity="0.8"/>

    <!-- industry / gold -->
    <rect x="642" y="190" width="88" height="172" fill="#161b22" stroke="#30363d"/>
    <rect x="642" y="190" width="88" height="5" fill="#e3b341"/>
    <rect x="649" y="204" width="74" height="150" fill="url(#win-dim)"/>
    <rect x="666" y="229" width="7" height="9" fill="#e3b341" opacity="0.9"/>
    <rect x="694" y="269" width="7" height="9" fill="#e3b341" opacity="0.7"/>
    <rect x="652" y="309" width="7" height="9" fill="#c9d1d9" opacity="0.6"/>
    <rect x="708" y="329" width="7" height="9" fill="#e3b341" opacity="0.85"/>
    <!-- antenna -->
    <rect x="684" y="170" width="3" height="20" fill="#30363d"/>
    <circle cx="685.5" cy="168" r="3" fill="#f85149"/>

    <!-- green policy / green -->
    <rect x="744" y="230" width="58" height="132" fill="#161b22" stroke="#30363d"/>
    <rect x="744" y="230" width="58" height="5" fill="#3fb950"/>
    <rect x="750" y="244" width="46" height="110" fill="url(#win-dim)"/>
    <rect x="767" y="269" width="7" height="9" fill="#3fb950" opacity="0.9"/>
    <rect x="753" y="329" width="7" height="9" fill="#3fb950" opacity="0.7"/>
    <!-- rooftop tree -->
    <rect x="769" y="219" width="4" height="11" fill="#21262d"/>
    <circle cx="771" cy="215" r="7" fill="#3fb950" opacity="0.9"/>

    <!-- treasury tower / blue (tallest) -->
    <rect x="816" y="142" width="98" height="220" fill="#161b22" stroke="#30363d"/>
    <rect x="816" y="142" width="98" height="5" fill="#388bfd"/>
    <rect x="824" y="156" width="82" height="198" fill="url(#win-dim)"/>
    <rect x="841" y="181" width="7" height="9" fill="#388bfd" opacity="0.9"/>
    <rect x="869" y="201" width="7" height="9" fill="#c9d1d9" opacity="0.6"/>
    <rect x="897" y="241" width="7" height="9" fill="#388bfd" opacity="0.8"/>
    <rect x="827" y="281" width="7" height="9" fill="#e3b341" opacity="0.8"/>
    <rect x="883" y="321" width="7" height="9" fill="#388bfd" opacity="0.7"/>

    <!-- stability / red-alert block -->
    <rect x="928" y="212" width="66" height="150" fill="#161b22" stroke="#30363d"/>
    <rect x="928" y="212" width="66" height="5" fill="#f85149"/>
    <rect x="935" y="226" width="52" height="128" fill="url(#win-dim)"/>
    <rect x="952" y="251" width="7" height="9" fill="#f85149" opacity="0.85"/>
    <rect x="938" y="311" width="7" height="9" fill="#c9d1d9" opacity="0.5"/>

    <!-- founding hall / gray -->
    <rect x="1008" y="268" width="76" height="94" fill="#161b22" stroke="#30363d"/>
    <rect x="1008" y="268" width="76" height="5" fill="#8b949e"/>
    <rect x="1015" y="282" width="62" height="72" fill="url(#win-dim)"/>
    <rect x="1032" y="307" width="7" height="9" fill="#c9d1d9" opacity="0.7"/>
    <rect x="1060" y="327" width="7" height="9" fill="#e3b341" opacity="0.7"/>

    <!-- construction crane (world still building itself) -->
    <g stroke="#8b949e" stroke-width="3" fill="none" opacity="0.85">
      <path d="M1120 362 V 240 H 1180 M1120 240 L1100 262"/>
      <path d="M1160 240 V 268" stroke-width="2"/>
    </g>
    <rect x="1153" y="268" width="14" height="12" fill="#e3b341"/>
  </g>

  <!-- ============ GIT GRAPH → city ============ -->
  <!-- main branch -->
  <line x1="56" y1="386" x2="1144" y2="386" stroke="#30363d" stroke-width="3"/>
  <!-- branches merging up into buildings -->
  <g fill="none" stroke-width="3">
    <path d="M430 386 C 480 386, 520 362, 594 362" stroke="#bc8cff"/>
    <path d="M500 386 C 560 386, 600 362, 686 362" stroke="#e3b341"/>
    <path d="M580 386 C 650 386, 690 362, 773 362" stroke="#3fb950"/>
    <path d="M660 386 C 740 386, 780 362, 865 362" stroke="#388bfd"/>
    <path d="M760 386 C 850 386, 880 362, 961 362" stroke="#f85149"/>
    <path d="M860 386 C 950 386, 970 362, 1046 362" stroke="#8b949e"/>
  </g>
  <!-- commit dots on main branch -->
  <g stroke="#0d1117" stroke-width="2.5">
    <circle cx="96"  cy="386" r="7" fill="#8b949e"/>
    <circle cx="200" cy="386" r="7" fill="#c9d1d9"/>
    <circle cx="310" cy="386" r="7" fill="#8b949e"/>
    <circle cx="430" cy="386" r="7" fill="#bc8cff"/>
    <circle cx="500" cy="386" r="7" fill="#e3b341"/>
    <circle cx="580" cy="386" r="7" fill="#3fb950"/>
    <circle cx="660" cy="386" r="7" fill="#388bfd"/>
    <circle cx="760" cy="386" r="7" fill="#f85149"/>
    <circle cx="860" cy="386" r="7" fill="#8b949e"/>
    <circle cx="1000" cy="386" r="7" fill="#c9d1d9"/>
    <circle cx="1120" cy="386" r="8" fill="#3fb950"/>
  </g>
  <!-- merge dots at building bases -->
  <g stroke="#0d1117" stroke-width="2">
    <circle cx="594"  cy="362" r="5.5" fill="#bc8cff"/>
    <circle cx="686"  cy="362" r="5.5" fill="#e3b341"/>
    <circle cx="773"  cy="362" r="5.5" fill="#3fb950"/>
    <circle cx="865"  cy="362" r="5.5" fill="#388bfd"/>
    <circle cx="961"  cy="362" r="5.5" fill="#f85149"/>
    <circle cx="1046" cy="362" r="5.5" fill="#8b949e"/>
  </g>
  <!-- HEAD label -->
  <text x="1120" y="410" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="11" fill="#3fb950">HEAD</text>

  <!-- ============ TITLE ============ -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
    <text x="64" y="120" font-size="20" fill="#8b949e">~/world $</text>
    <text x="64" y="190" font-size="76" font-weight="bold" letter-spacing="6">
      <tspan fill="#e3b341">GIT</tspan><tspan fill="#e6edf3">IZENS</tspan>
    </text>
    <text x="64" y="232" font-size="19" fill="#c9d1d9">A civilization that lives inside a GitHub repo.</text>
    <g font-size="14" fill="#8b949e">
      <text x="64" y="280"><tspan fill="#388bfd">issues</tspan> → laws</text>
      <text x="64" y="306"><tspan fill="#3fb950">reactions</tspan> → votes</text>
      <text x="64" y="332"><tspan fill="#bc8cff">actions</tspan> → the world ticks every 4h</text>
    </g>
    <!-- blinking-cursor hint (static) -->
    <rect x="184" y="106" width="10" height="18" fill="#3fb950"/>
  </g>
</svg>
